name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ruff-mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: ruff
        run: ruff check .
      - name: mypy
        run: mypy agentsuite
