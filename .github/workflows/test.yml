name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-integration-golden:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Unit + integration + golden tests
        run: pytest tests/unit tests/integration tests/golden -v --cov=agentsuite --cov-report=term-missing

  cleanroom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run cleanroom (mocked LLM)
        run: bash scripts/run-cleanroom.sh
