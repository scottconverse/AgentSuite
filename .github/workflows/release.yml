name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub Release creation
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build pip-audit cyclonedx-bom
      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/' | tr -d '\r')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match pyproject version $PYPROJECT_VERSION"
            exit 1
          fi
      - name: Build
        run: python -m build
      - name: Install built wheel for audit + SBOM
        run: |
          python -m venv .audit-venv
          .audit-venv/bin/pip install --upgrade pip
          .audit-venv/bin/pip install dist/*.whl
      - name: Run pip-audit (HIGH/CRITICAL gate)
        env:
          # Allow override for emergencies via tag annotation containing [skip-audit].
          # Standard releases do NOT use this — fail loudly if a vulnerable transitive
          # dep is shipped.
          SKIP_AUDIT: ${{ contains(github.event.head_commit.message, '[skip-audit]') }}
        run: |
          if [ "$SKIP_AUDIT" = "true" ]; then
            echo "::warning::pip-audit skipped via [skip-audit] override"
            exit 0
          fi
          .audit-venv/bin/pip-audit \
            --strict \
            --vulnerability-service osv \
            --requirement <(.audit-venv/bin/pip freeze) \
            --format json \
            --output pip-audit.json
      - name: Generate SBOM (CycloneDX JSON)
        run: |
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/' | tr -d '\r')
          .audit-venv/bin/cyclonedx-py environment \
            --of json \
            --output-file "dist/agentsuite-${PYPROJECT_VERSION}-sbom.cdx.json" \
            .audit-venv/bin/python
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*-sbom.cdx.json
            pip-audit.json
