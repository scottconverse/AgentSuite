name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub Release creation
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build pip-audit cyclonedx-bom
      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/' | tr -d '\r')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match pyproject version $PYPROJECT_VERSION"
            exit 1
          fi
      - name: Build
        run: python -m build
      - name: Verify README install block has not drifted from fixture
        run: |
          python scripts/check_install_block_drift.py
      - name: Install built wheel for audit + SBOM + smoke
        run: |
          python -m venv .audit-venv
          .audit-venv/bin/pip install --upgrade pip
          # Install the wheel WITH the [mcp] extra so the smoke step below
          # can verify both CLIs. The README documents both `pip install
          # agentsuite[<provider>]` and `uvx --from agentsuite[mcp] ...`,
          # so the smoke must exercise the [mcp] codepath too. Find the
          # wheel filename first since glob expansion + extras spec is
          # unreliable in shell.
          WHEEL=$(ls dist/*.whl | head -1)
          .audit-venv/bin/pip install "${WHEEL}[mcp]"
      - name: Smoke check — agentsuite CLI runs from clean install
        run: |
          # The wheel install above is the same shape an end user gets
          # via the README's git+pip command: a fresh venv with only the
          # built artifact's dependency closure. If --help fails here, the
          # README's install instructions don't actually work.
          .audit-venv/bin/agentsuite --help
          .audit-venv/bin/agentsuite-mcp --help
      - name: Run pip-audit (any vulnerability fails)
        env:
          # Allow override for emergencies via the commit message of the tagged
          # commit. Standard releases do NOT use this — fail loudly if a
          # vulnerable transitive dep is shipped.
          SKIP_AUDIT: ${{ contains(github.event.head_commit.message, '[skip-audit]') }}
        run: |
          if [ "$SKIP_AUDIT" = "true" ]; then
            echo "::warning::pip-audit skipped via [skip-audit] override"
            exit 0
          fi
          # pip-audit is installed in the system Python (outer venv) — call it
          # directly and point --requirement at the freeze of .audit-venv so the
          # audit covers exactly the dependencies the published wheel pulls in.
          pip-audit \
            --strict \
            --vulnerability-service osv \
            --requirement <(.audit-venv/bin/pip freeze) \
            --format json \
            --output pip-audit.json
      - name: Generate SBOM (CycloneDX JSON)
        run: |
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/' | tr -d '\r')
          # cyclonedx-py is installed in the system Python — call directly and
          # point at the .audit-venv interpreter so the SBOM lists the wheel's
          # actual dependency closure.
          cyclonedx-py environment \
            --of json \
            --output-file "dist/agentsuite-${PYPROJECT_VERSION}-sbom.cdx.json" \
            .audit-venv/bin/python
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*-sbom.cdx.json
            pip-audit.json

  windows-smoke:
    # QA-001 regression gate: confirm `agentsuite --help` runs cleanly on
    # default-Windows (cp1252 console). v1.0.0 shipped with a UnicodeEncodeError
    # on the Typer help text. The fix is in `agentsuite/cli.py` (ASCII help
    # string + early `sys.stdout.reconfigure(encoding="utf-8")`); this matrix
    # confirms it stays fixed.
    needs: build-and-publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install from source (matches the README's git+pip path)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install ".[mcp]"
      - name: Smoke (Windows) -- agentsuite --help under default cp1252 console
        shell: pwsh
        env:
          PYTHONIOENCODING: cp1252
        run: |
          agentsuite --help
          agentsuite-mcp --help
